<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>SOLIID</title>
  <meta name="description" content="SOLIID" />
  <style>
    :root {
      --bg: #09035b;
      --fg: #f3ff7e;
      --transition: 2.4s cubic-bezier(0.65, 0, 0.35, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      transition: background-color var(--transition);
    }

    .wordmark {
      width: clamp(255px, 42vw, 532px);
      height: auto;
    }

    /* Every glyph + dot path follows the foreground colour. */
    .wordmark path {
      fill: var(--fg);
      transition: fill var(--transition);
    }

    @media (prefers-reduced-motion: reduce) {
      :root { --transition: 0s; }
    }

    /* Accent dots trade places vertically. The two dot centres are
       ~234.66 user units apart on the 269-tall viewBox. */
    .dot { will-change: transform; }
    .dot--top    { animation: dropDown 6s ease-in-out infinite; }
    .dot--bottom { animation: riseUp 6s ease-in-out infinite; }

    /* translate values are in SVG user units (viewBox space) */
    @keyframes dropDown {
      0%, 35%   { transform: translateY(0); }
      50%, 85%  { transform: translateY(234.66px); }
      100%      { transform: translateY(0); }
    }
    @keyframes riseUp {
      0%, 35%   { transform: translateY(0); }
      50%, 85%  { transform: translateY(-234.66px); }
      100%      { transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot--top, .dot--bottom { animation: none; }
    }
  </style>

  <script>
    const palettes = [
      { bg: '#09035b', fg: '#f3ff7e' }, // navy / yellow-green
      { bg: '#f99500', fg: '#09035b' }, // orange / navy
      { bg: '#c6f9b3', fg: '#f99500' }, // mint / orange
      { bg: '#f3ff7e', fg: '#09035b' }  // yellow / navy
    ];
    let i = 0;
    const root = document.documentElement;
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!reduceMotion) {
      setInterval(() => {
        i = (i + 1) % palettes.length;
        root.style.setProperty('--bg', palettes[i].bg);
        root.style.setProperty('--fg', palettes[i].fg);
      }, 3600);
    }
  </script>
